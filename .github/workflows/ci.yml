name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          save-caches: 'true'
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Static analysis
        uses: ./.github/actions/static-analysis
        with:
          event-name: ${{ github.event_name }}
          base-ref: ${{ github.base_ref }}
          before-sha: ${{ github.event.before }}
          sha: ${{ github.sha }}

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Unit tests
        run: pnpm test:coverage
      - name: Coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Integration tests
        run: pnpm test:integration

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Migrate and seed database
        run: pnpm db:migrate && pnpm with:env tsx test/seed/seed-runner.ts e2e
      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Build application
        run: pnpm build
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      - name: E2E smoke (desktop only)
        run: |
          pnpm exec playwright test \
            --grep @smoke \
            --project="chromium:authenticated" \
            --project="chromium:public"
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-blob-report-smoke
          path: blob-report/
          retention-days: 14

  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'merge_group'
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Migrate and seed database
        run: pnpm db:migrate && pnpm with:env tsx test/seed/seed-runner.ts e2e
      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Build application
        run: pnpm build
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      - name: E2E full suite (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          pnpm test:e2e \
            --project="chromium:authenticated" \
            --project="chromium:public" \
            --project="iphone" \
            --project="pixel" \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-blob-report-full-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 14

  e2e-full-report:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.e2e-full.result != 'failure' && (github.event_name == 'push' || github.event_name == 'merge_group') }}
    needs: [e2e-full]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Download blob reports
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: all-blob-reports
          pattern: playwright-blob-report-full-*
          merge-multiple: true
      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=blob ./all-blob-reports
      - name: Upload merged report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-blob-report-full
          path: blob-report/
          retention-days: 14

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        static-analysis,
        unit-tests,
        integration-tests,
        e2e-smoke,
        e2e-full,
        e2e-full-report,
      ]
    steps:
      - name: Summarize results
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status | Required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static analysis | \`${{ needs.static-analysis.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit tests | \`${{ needs.unit-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration tests | \`${{ needs.integration-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E smoke (PR) | \`${{ needs.e2e-smoke.result }}\` | ⚠️ PR only |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E full (merge) | \`${{ needs.e2e-full.result }}\` | ⚠️ Merge only |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          fail_if_bad() {
            if [ "$2" = "failure" ] || [ "$2" = "cancelled" ]; then
              echo "Job '$1' failed or was cancelled"
              exit 1
            fi
          }

          fail_if_bad "static-analysis" "${{ needs.static-analysis.result }}"

          if [ "${{ needs.unit-tests.result }}" != "skipped" ]; then
            fail_if_bad "unit-tests" "${{ needs.unit-tests.result }}"
          fi

          if [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
            fail_if_bad "integration-tests" "${{ needs.integration-tests.result }}"
          fi

          # E2E: one of smoke/full will be skipped depending on event type
          e2e_smoke="${{ needs.e2e-smoke.result }}"
          e2e_full="${{ needs.e2e-full.result }}"

          if [ "$e2e_smoke" = "success" ] || [ "$e2e_smoke" = "skipped" ]; then
            true
          else
            echo "⚠️ E2E smoke: $e2e_smoke" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$e2e_full" = "success" ] || [ "$e2e_full" = "skipped" ]; then
            true
          else
            echo "⚠️ E2E full: $e2e_full" >> "$GITHUB_STEP_SUMMARY"
          fi
