name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          save-caches: 'true'
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Static analysis
        uses: ./.github/actions/static-analysis
        with:
          event-name: ${{ github.event_name }}
          base-ref: ${{ github.base_ref }}
          before-sha: ${{ github.event.before }}
          sha: ${{ github.sha }}

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Unit tests
        run: pnpm test:coverage
      - name: Coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Integration tests
        run: pnpm test:integration

  e2e-tests:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@8d0d610af187e78a2772c2d18d627f4c52d3fbfb # v3.1.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          BETTER_AUTH_SECRET: op://Infrastructure Secrets/finance-tracker-env/BETTER_AUTH_SECRET
          BETTER_AUTH_URL: op://Infrastructure Secrets/finance-tracker-env/BETTER_AUTH_URL
          BREVO_API_KEY: op://Infrastructure Secrets/finance-tracker-env/BREVO_API_KEY
          EMAIL_FROM: op://Infrastructure Secrets/finance-tracker-env/EMAIL_FROM
          EMAIL_FROM_NAME: op://Infrastructure Secrets/finance-tracker-env/EMAIL_FROM_NAME
          EMAIL_REPLY_TO: op://Infrastructure Secrets/finance-tracker-env/EMAIL_REPLY_TO
          GITHUB_CLIENT_ID: op://Infrastructure Secrets/finance-tracker-env/GITHUB_CLIENT_ID
          GITHUB_CLIENT_SECRET: op://Infrastructure Secrets/finance-tracker-env/GITHUB_CLIENT_SECRET
          GOOGLE_CLIENT_ID: op://Infrastructure Secrets/finance-tracker-env/GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET: op://Infrastructure Secrets/finance-tracker-env/GOOGLE_CLIENT_SECRET
          TRUSTED_ORIGINS: op://Infrastructure Secrets/finance-tracker-env/TRUSTED_ORIGINS
          LOG_HASH_SECRET: op://Infrastructure Secrets/finance-tracker-env/LOG_HASH_SECRET
          E2E_USER_EMAIL: op://Infrastructure Secrets/finance-tracker-env/E2E_USER_EMAIL
          E2E_USER_PASSWORD: op://Infrastructure Secrets/finance-tracker-env/E2E_USER_PASSWORD
      - name: Write .env file
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=postgres://finance_tracker:finance_tracker_password@localhost:5432/finance_tracker_dev
          BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }}
          BREVO_API_KEY=${{ env.BREVO_API_KEY }}
          EMAIL_FROM=${{ env.EMAIL_FROM }}
          EMAIL_FROM_NAME=${{ env.EMAIL_FROM_NAME }}
          EMAIL_REPLY_TO=${{ env.EMAIL_REPLY_TO }}
          GITHUB_CLIENT_ID=${{ env.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ env.GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ env.GOOGLE_CLIENT_SECRET }}
          TRUSTED_ORIGINS=${{ env.TRUSTED_ORIGINS }}
          LOG_HASH_SECRET=${{ env.LOG_HASH_SECRET }}
          E2E_USER_EMAIL=${{ env.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD=${{ env.E2E_USER_PASSWORD }}
          EMAIL_SANDBOX=true
          VITE_CLIENT_LOG_LEVEL=warn
          EOF
      - name: Compile paraglide
        run: pnpm paraglide:compile
      - name: Migrate and seed database
        run: pnpm db:migrate && pnpm with:env tsx test/seed/seed-runner.ts e2e
      - name: Cache Playwright browsers
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4.2.1
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: E2E tests
        run: pnpm test:e2e
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-blob-report
          path: blob-report/
          retention-days: 14

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [static-analysis, unit-tests, integration-tests, e2e-tests]
    steps:
      - name: Summarize results
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status | Required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static analysis | \`${{ needs.static-analysis.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit tests | \`${{ needs.unit-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration tests | \`${{ needs.integration-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E tests | \`${{ needs.e2e-tests.result }}\` | ⚠️ No |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          fail_if_bad() {
            if [ "$2" = "failure" ] || [ "$2" = "cancelled" ]; then
              echo "Job '$1' failed or was cancelled"
              exit 1
            fi
          }

          fail_if_bad "static-analysis" "${{ needs.static-analysis.result }}"

          if [ "${{ needs.unit-tests.result }}" != "skipped" ]; then
            fail_if_bad "unit-tests" "${{ needs.unit-tests.result }}"
          fi

          if [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
            fail_if_bad "integration-tests" "${{ needs.integration-tests.result }}"
          fi

          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "✅ All jobs passed" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "⚠️ E2E tests failed" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.e2e-tests.result }}" = "cancelled" ]; then
            echo "⚠️ E2E tests cancelled" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ E2E tests skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
