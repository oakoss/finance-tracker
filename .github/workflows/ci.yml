name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          save-caches: 'true'
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Static analysis
        uses: ./.github/actions/static-analysis
        with:
          event-name: ${{ github.event_name }}
          base-ref: ${{ github.base_ref }}
          before-sha: ${{ github.event.before }}
          sha: ${{ github.sha }}

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Unit tests
        run: pnpm test:coverage
      - name: Coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Integration tests
        run: pnpm test:integration

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker_password
          POSTGRES_DB: finance_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
      - name: Prepare CI environment
        uses: ./.github/actions/ci-prepare
      - name: Migrate and seed database
        run: pnpm db:migrate && pnpm with:env tsx test/seed/seed-runner.ts e2e
      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: E2E tests
        run: pnpm test:e2e
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-blob-report
          path: blob-report/
          retention-days: 14

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [static-analysis, unit-tests, integration-tests, e2e-tests]
    steps:
      - name: Summarize results
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status | Required |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static analysis | \`${{ needs.static-analysis.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit tests | \`${{ needs.unit-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration tests | \`${{ needs.integration-tests.result }}\` | ✅ Yes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E tests | \`${{ needs.e2e-tests.result }}\` | ⚠️ No |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          fail_if_bad() {
            if [ "$2" = "failure" ] || [ "$2" = "cancelled" ]; then
              echo "Job '$1' failed or was cancelled"
              exit 1
            fi
          }

          fail_if_bad "static-analysis" "${{ needs.static-analysis.result }}"

          if [ "${{ needs.unit-tests.result }}" != "skipped" ]; then
            fail_if_bad "unit-tests" "${{ needs.unit-tests.result }}"
          fi

          if [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
            fail_if_bad "integration-tests" "${{ needs.integration-tests.result }}"
          fi

          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "✅ All jobs passed" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "⚠️ E2E tests failed" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.e2e-tests.result }}" = "cancelled" ]; then
            echo "⚠️ E2E tests cancelled" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ E2E tests skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
